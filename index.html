<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTE Vocabulary → Excel Tool</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3e;
  --border: #2a2a5a;
  --text: #e0e0f0;
  --text2: #8888aa;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --success: #00cec9;
  --danger: #ff6b6b;
  --warning: #feca57;
  --glass: rgba(255,255,255,0.04);
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--success));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex: 1;
}
.api-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
.api-section input {
  background: var(--glass);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  width: 280px;
  font-family: 'Inter', monospace;
  transition: border-color 0.2s;
}
.api-section input:focus { outline: none; border-color: var(--accent); }
.api-section input::placeholder { color: var(--text2); }

/* Buttons */
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; }
.btn-primary:hover { box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
.btn-success { background: linear-gradient(135deg, var(--success), #00b894); color: #fff; }
.btn-success:hover { box-shadow: 0 4px 15px rgba(0,206,201,0.4); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-outline:hover { border-color: var(--accent); color: var(--text); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* Main layout */
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

/* Drop zone */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: 16px;
  padding: 40px;
  text-align: center;
  transition: all 0.3s;
  cursor: pointer;
  background: var(--glass);
  margin-bottom: 20px;
}
.drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(108,92,231,0.08);
  transform: scale(1.01);
}
.drop-zone-icon { font-size: 48px; margin-bottom: 12px; }
.drop-zone-text { color: var(--text2); font-size: 14px; }
.drop-zone-text strong { color: var(--accent2); }

/* Image grid */
.images-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}
.image-card {
  position: relative;
  width: 140px;
  border-radius: 12px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: var(--surface);
  transition: all 0.2s;
}
.image-card:hover { border-color: var(--accent); }
.image-card.processing { border-color: var(--warning); }
.image-card.done { border-color: var(--success); }
.image-card.error { border-color: var(--danger); }
.image-card img { width: 100%; height: 100px; object-fit: cover; display: block; }
.image-card .card-footer {
  padding: 6px 8px;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.image-card .card-name { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
.image-card .card-status { font-size: 14px; }
.image-card .btn-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.image-card:hover .btn-remove { opacity: 1; }

/* Toolbar */
.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.toolbar .info {
  margin-left: auto;
  font-size: 13px;
  color: var(--text2);
}

/* Progress */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 20px;
  display: none;
}
.progress-bar.active { display: block; }
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  border-radius: 4px;
  transition: width 0.3s;
  width: 0%;
}

/* Status log */
.status-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--text2);
  max-height: 120px;
  overflow-y: auto;
  display: none;
}
.status-log.active { display: block; }
.status-log .log-line { margin: 2px 0; }
.status-log .log-line.success { color: var(--success); }
.status-log .log-line.error { color: var(--danger); }
.status-log .log-line.info { color: var(--accent2); }

/* Data table */
.table-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 20px;
}
.table-section .section-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--glass);
}
.table-section .section-header h2 {
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}
.table-wrap {
  overflow-x: auto;
  max-height: 600px;
  overflow-y: auto;
}
table.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
table.data-table thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
table.data-table th {
  background: #1a1a2e;
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  border-bottom: 2px solid var(--accent);
  white-space: nowrap;
}
table.data-table td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
table.data-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
table.data-table tr:hover td { background: rgba(108,92,231,0.06); }
table.data-table td[contenteditable] {
  cursor: text;
  outline: none;
}
table.data-table td[contenteditable]:focus {
  background: rgba(108,92,231,0.12) !important;
  box-shadow: inset 0 0 0 1px var(--accent);
}
table.data-table .col-stt { text-align: center; color: var(--text2); width: 50px; }
table.data-table .col-word { font-weight: 600; }
table.data-table .col-abbr { text-align: center; color: var(--text2); }
table.data-table .col-ipa { color: var(--text2); font-style: italic; }
table.data-table .col-type { color: #ff6b6b; font-weight: 600; text-align: center; }
table.data-table .col-meaning { }

/* Settings panel */
.settings-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  display: none;
}
.settings-panel.active { display: block; }
.settings-panel h3 { font-size: 14px; margin-bottom: 12px; color: var(--accent2); }
.setting-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.setting-row label { font-size: 13px; color: var(--text2); min-width: 160px; }
.setting-row select, .setting-row input[type="number"] {
  background: var(--glass);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
}
.setting-row select:focus, .setting-row input[type="number"]:focus {
  outline: none;
  border-color: var(--accent);
}

/* Export section */
.export-section {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  background: var(--glass);
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  color: #fff;
  z-index: 1000;
  animation: slideIn 0.3s ease;
  max-width: 360px;
}
.toast.success { background: linear-gradient(135deg, #00b894, #00cec9); }
.toast.error { background: linear-gradient(135deg, #e17055, #ff6b6b); }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Help link */
.help-link {
  color: var(--accent2);
  text-decoration: none;
  font-size: 12px;
}
.help-link:hover { text-decoration: underline; }

/* Responsive */
@media (max-width: 768px) {
  .header { flex-wrap: wrap; }
  .api-section input { width: 200px; }
  .container { padding: 12px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>📚 PTE Vocabulary → Excel</h1>
  <div class="api-section">
    <select id="providerSelect" onchange="onProviderChange()" style="background:var(--glass);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-size:12px;font-family:'Inter',sans-serif">
      <option value="openrouter">OpenRouter</option>
      <option value="gemini">Gemini</option>
    </select>
    <span style="font-size:13px;color:var(--text2)">🔑</span>
    <input type="password" id="apiKey" placeholder="Nhập API Key (chỉ cần 1 lần)" />
    <button class="btn btn-sm btn-outline" onclick="toggleKeyVisibility()">👁</button>
    <button class="btn btn-sm btn-primary" onclick="saveApiKey()">Lưu</button>
    <a id="helpLink" href="https://openrouter.ai/keys" target="_blank" class="help-link">Lấy key →</a>
  </div>
</div>

<div class="container">

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="drop-zone-icon">📁</div>
    <div class="drop-zone-text">
      <strong>Kéo thả hình</strong> vào đây hoặc <strong>click để chọn</strong><br>
      Hỗ trợ JPG, PNG — Nhiều file cùng lúc
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
  </div>

  <!-- Image grid -->
  <div class="images-grid" id="imagesGrid"></div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none">
    <button class="btn btn-primary" id="btnExtract" onclick="extractAll()">
      🔍 Extract tất cả
    </button>
    <button class="btn btn-outline" onclick="clearAll()">🗑 Xóa tất cả</button>
    <button class="btn btn-outline" onclick="toggleSettings()">⚙️ Cài đặt</button>
    <div class="info" id="infoText"></div>
  </div>

  <!-- Settings -->
  <div class="settings-panel" id="settingsPanel">
    <h3>⚙️ Cài đặt</h3>
    <div class="setting-row">
      <label>Số từ mỗi sheet:</label>
      <input type="number" id="wordsPerSheet" value="40" min="10" max="100">
    </div>
    <div class="setting-row">
      <label>Tên file output:</label>
      <input type="text" id="outputName" value="PTE_Vocab" style="background:var(--glass);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:13px;width:200px;">
    </div>
    <div class="setting-row">
      <label>AI Model:</label>
      <select id="aiModel">
        <optgroup label="OpenRouter - Có phí (tốt nhất)" id="openrouterPaidModels">
          <option value="google/gemini-2.5-flash">⭐ Gemini 2.5 Flash ($)</option>
          <option value="google/gemini-2.5-flash-lite">Gemini 2.5 Flash Lite ($)</option>
          <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash ($)</option>
          <option value="openai/gpt-4o-mini">GPT-4o Mini ($)</option>
          <option value="anthropic/claude-3.5-haiku">Claude 3.5 Haiku ($)</option>
        </optgroup>
        <optgroup label="OpenRouter - Miễn phí" id="openrouterModels">
          <option value="qwen/qwen3.6-plus:free">Qwen 3.6 Plus (free)</option>
          <option value="google/gemma-3-27b-it:free">Gemma 3 27B (free)</option>
          <option value="meta-llama/llama-4-maverick:free">Llama 4 Maverick (free)</option>
          <option value="stepfun/step-3.5-flash:free">Step 3.5 Flash (free)</option>
        </optgroup>
        <optgroup label="Gemini Direct" id="geminiModels">
          <option value="gemini-2.5-flash-preview-04-17">gemini-2.5-flash</option>
          <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
          <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        </optgroup>
      </select>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

  <!-- Status log -->
  <div class="status-log" id="statusLog"></div>

  <!-- Data table -->
  <div class="table-section" id="tableSection" style="display:none">
    <div class="section-header">
      <h2>📊 Dữ liệu đã extract</h2>
      <span id="dataCount" style="font-size:12px;color:var(--text2)"></span>
      <button class="btn btn-sm btn-outline" onclick="copyAsText()">📋 Copy</button>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="dataTable">
        <thead id="dataTableHead"></thead>
        <tbody id="dataTableBody"></tbody>
      </table>
    </div>
    <div class="export-section">
      <button class="btn btn-success" onclick="downloadExcel('single')">📥 Download 1 Sheet</button>
      <button class="btn btn-success" onclick="downloadExcel('multi')">📥 Download Nhiều Sheet</button>
      <button class="btn btn-outline" onclick="downloadExcel('both')">📥 Download cả 2</button>
    </div>
  </div>

</div>

<script>
// ============ STATE ============
let images = [];       // { id, file, dataUrl, name, status, rows }
let allData = [];      // merged rows from all images
let detectedColumns = [];  // column headers detected

// ============ PROVIDER & API KEY ============
function getProvider() {
  return document.getElementById('providerSelect').value;
}

function onProviderChange() {
  const provider = getProvider();
  const helpLink = document.getElementById('helpLink');
  const apiKeyInput = document.getElementById('apiKey');
  if (provider === 'openrouter') {
    helpLink.href = 'https://openrouter.ai/keys';
    helpLink.textContent = 'Lấy key →';
    apiKeyInput.placeholder = 'Nhập OpenRouter API Key';
    const savedKey = localStorage.getItem('openrouter_api_key');
    apiKeyInput.value = savedKey || '';
  } else {
    helpLink.href = 'https://aistudio.google.com/app/apikey';
    helpLink.textContent = 'Lấy key →';
    apiKeyInput.placeholder = 'Nhập Gemini API Key';
    const savedKey = localStorage.getItem('gemini_api_key');
    apiKeyInput.value = savedKey || '';
  }
  updateModelVisibility();
}

function updateModelVisibility() {
  const provider = getProvider();
  const select = document.getElementById('aiModel');
  const orPaidGroup = document.getElementById('openrouterPaidModels');
  const orGroup = document.getElementById('openrouterModels');
  const gmGroup = document.getElementById('geminiModels');
  if (provider === 'openrouter') {
    orPaidGroup.style.display = '';
    orGroup.style.display = '';
    gmGroup.style.display = 'none';
    if (select.selectedOptions[0]?.parentElement === gmGroup) select.selectedIndex = 0;
  } else {
    orPaidGroup.style.display = 'none';
    orGroup.style.display = 'none';
    gmGroup.style.display = '';
    const firstGm = gmGroup.querySelector('option');
    if (firstGm) firstGm.selected = true;
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const savedProvider = localStorage.getItem('ai_provider') || 'openrouter';
  document.getElementById('providerSelect').value = savedProvider;
  onProviderChange();
});

function saveApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  const provider = getProvider();
  if (key) {
    localStorage.setItem(provider + '_api_key', key);
    localStorage.setItem('ai_provider', provider);
    showToast('API Key đã lưu!', 'success');
  }
}

function toggleKeyVisibility() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function getApiKey() {
  return document.getElementById('apiKey').value.trim();
}

// ============ DRAG & DROP ============
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
  if (!imageFiles.length) return;

  // Sort by name naturally
  imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  imageFiles.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      images.push({
        id: Date.now() + Math.random(),
        file,
        dataUrl: e.target.result,
        name: file.name,
        status: 'ready',  // ready, processing, done, error
        rows: []
      });
      renderImages();
    };
    reader.readAsDataURL(file);
  });
}

// ============ RENDER IMAGES ============
function renderImages() {
  const grid = document.getElementById('imagesGrid');
  const toolbar = document.getElementById('toolbar');

  if (!images.length) {
    grid.innerHTML = '';
    toolbar.style.display = 'none';
    return;
  }

  toolbar.style.display = 'flex';
  updateInfo();

  grid.innerHTML = images.map((img, i) => {
    const statusIcon = { ready: '⏳', processing: '🔄', done: '✅', error: '❌' }[img.status];
    return `
      <div class="image-card ${img.status}" data-idx="${i}">
        <button class="btn-remove" onclick="removeImage(${i})">✕</button>
        <img src="${img.dataUrl}" alt="${img.name}" />
        <div class="card-footer">
          <span class="card-name">${img.name}</span>
          <span class="card-status">${statusIcon}</span>
        </div>
      </div>`;
  }).join('');
}

function removeImage(idx) {
  images.splice(idx, 1);
  renderImages();
  mergeAndRender();
}

function clearAll() {
  images = [];
  allData = [];
  detectedColumns = [];
  renderImages();
  document.getElementById('tableSection').style.display = 'none';
  document.getElementById('statusLog').className = 'status-log';
  document.getElementById('progressBar').className = 'progress-bar';
}

function updateInfo() {
  const done = images.filter(i => i.status === 'done').length;
  const total = images.length;
  const wordCount = images.reduce((s, i) => s + i.rows.length, 0);
  document.getElementById('infoText').textContent = `${total} hình | ${done} đã xong | ${wordCount} từ`;
}

// ============ AI API (OpenRouter + Gemini) ============
const PROMPT = `You are a precise OCR tool. Analyze this vocabulary table image carefully.

INSTRUCTIONS:
1. Detect all columns in the table (there may be 5 or 6 columns)
2. Extract EVERY row of data exactly as shown
3. Keep IPA phonetic symbols EXACTLY (e.g. /ðə/, /ˈstjuː.dents/)
4. Keep Vietnamese diacritics EXACTLY (e.g. Sinh viên, học sinh)
5. Keep abbreviations exactly (e.g. Det., N./V., Adj./Adv.)

Return ONLY valid JSON (no markdown, no code fences) in this format:
{
  "columns": ["col1_name", "col2_name", ...],
  "data": [
    ["val1", "val2", ...],
    ["val1", "val2", ...]
  ]
}

IMPORTANT:
- The first column is usually STT (number)
- Return STT as numbers, not strings
- If a cell appears empty, use ""
- Do NOT skip any rows
- Do NOT add rows that don't exist in the image`;

// Compress image to reduce payload size
function compressImage(dataUrl, maxWidth) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

async function callAI(imageDataUrl, fileName) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('Chưa nhập API Key!');
  const provider = getProvider();
  return provider === 'openrouter' ? callOpenRouter(apiKey, imageDataUrl) : callGeminiDirect(apiKey, imageDataUrl);
}

async function callOpenRouter(apiKey, imageDataUrl) {
  const model = document.getElementById('aiModel').value;
  const resp = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      'HTTP-Referer': window.location.href,
      'X-Title': 'PTE Vocab Tool'
    },
    body: JSON.stringify({
      model: model,
      messages: [{
        role: 'user',
        content: [
          { type: 'text', text: PROMPT },
          { type: 'image_url', image_url: { url: imageDataUrl } }
        ]
      }],
      temperature: 0.1,
      max_tokens: 8192
    })
  });

  if (!resp.ok) {
    const errData = await resp.json().catch(() => ({}));
    throw new Error(errData?.error?.message || `API error ${resp.status}`);
  }

  const data = await resp.json();
  const text = data?.choices?.[0]?.message?.content;
  if (!text) throw new Error('Empty response from API');
  return parseJSON(text);
}

async function callGeminiDirect(apiKey, imageDataUrl) {
  const model = document.getElementById('aiModel').value;
  const base64 = imageDataUrl.split(',')[1];
  const mimeType = imageDataUrl.match(/data:([^;]+)/)[1];

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [
        { text: PROMPT },
        { inline_data: { mime_type: mimeType, data: base64 } }
      ]}],
      generationConfig: { temperature: 0.1, maxOutputTokens: 8192 }
    })
  });

  if (!resp.ok) {
    const errData = await resp.json().catch(() => ({}));
    throw new Error(errData?.error?.message || `API error ${resp.status}`);
  }

  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Empty response from Gemini');
  return parseJSON(text);
}

function parseJSON(text) {
  let cleaned = text.trim();
  if (cleaned.startsWith('```')) {
    cleaned = cleaned.replace(/^```(?:json)?\n?/, '').replace(/\n?```$/, '');
  }
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    throw new Error('JSON không hợp lệ: ' + cleaned.substring(0, 200));
  }
}

// ============ EXTRACT ============
async function extractAll() {
  const apiKey = getApiKey();
  if (!apiKey) { showToast('Vui lòng nhập Gemini API Key!', 'error'); return; }
  if (!images.length) { showToast('Chưa có hình nào!', 'error'); return; }

  const pendingImages = images.filter(i => i.status !== 'done');
  if (!pendingImages.length) { showToast('Tất cả hình đã extract rồi!', 'success'); return; }

  const btn = document.getElementById('btnExtract');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const statusLog = document.getElementById('statusLog');
  progressBar.className = 'progress-bar active';
  statusLog.className = 'status-log active';

  let processed = 0;

  for (const img of pendingImages) {
    img.status = 'processing';
    renderImages();
    addLog(`🔍 Đang đọc: ${img.name}...`, 'info');

    let retries = 3;
    let success = false;
    while (retries > 0 && !success) {
      try {
        // Compress image before sending (max 1200px width)
        const compressedUrl = await compressImage(img.dataUrl, 1200);
        const result = await callAI(compressedUrl, img.name);

        if (!detectedColumns.length && result.columns) {
          detectedColumns = result.columns;
          addLog(`📊 Phát hiện ${result.columns.length} cột: ${result.columns.join(', ')}`, 'info');
        }

        img.rows = result.data || [];
        img.status = 'done';
        addLog(`✅ ${img.name}: ${img.rows.length} dòng`, 'success');
        success = true;
      } catch (err) {
        retries--;
        if (err.message.includes('429') || err.message.includes('rate') || err.message.includes('Too Many')) {
          const wait = (4 - retries) * 8;  // 8s, 16s, 24s
          addLog(`⏳ Rate limit — chờ ${wait}s rồi thử lại (còn ${retries} lần)...`, 'info');
          await new Promise(r => setTimeout(r, wait * 1000));
        } else if (retries > 0) {
          addLog(`⚠️ Lỗi, thử lại (còn ${retries} lần): ${err.message}`, 'error');
          await new Promise(r => setTimeout(r, 3000));
        } else {
          img.status = 'error';
          img.rows = [];
          addLog(`❌ ${img.name}: ${err.message}`, 'error');
        }
      }
    }

    processed++;
    progressFill.style.width = (processed / pendingImages.length * 100) + '%';
    renderImages();

    // Delay between requests (3s for free tier)
    if (processed < pendingImages.length) {
      await new Promise(r => setTimeout(r, 3000));
    }
  }

  btn.disabled = false;
  btn.innerHTML = '🔍 Extract tất cả';

  mergeAndRender();

  const totalWords = images.reduce((s, i) => s + i.rows.length, 0);
  const errorCount = images.filter(i => i.status === 'error').length;
  if (errorCount) {
    showToast(`Xong! ${totalWords} từ (${errorCount} hình lỗi)`, 'error');
  } else {
    showToast(`Xong! ${totalWords} từ từ ${images.length} hình`, 'success');
  }
}

// ============ MERGE & RENDER TABLE ============
function mergeAndRender() {
  allData = [];
  images.forEach(img => {
    if (img.status === 'done') {
      allData.push(...img.rows);
    }
  });

  if (!allData.length) {
    document.getElementById('tableSection').style.display = 'none';
    return;
  }

  document.getElementById('tableSection').style.display = 'block';
  document.getElementById('dataCount').textContent = `${allData.length} dòng | ${detectedColumns.length} cột`;

  // Render header
  const thead = document.getElementById('dataTableHead');
  thead.innerHTML = '<tr>' + detectedColumns.map(c => `<th>${c}</th>`).join('') + '<th style="width:40px"></th></tr>';

  // Render body
  const tbody = document.getElementById('dataTableBody');
  tbody.innerHTML = allData.map((row, ri) => {
    const cells = row.map((val, ci) => {
      const cls = getColumnClass(ci, detectedColumns.length);
      return `<td class="${cls}" contenteditable="true" data-row="${ri}" data-col="${ci}">${escapeHtml(String(val))}</td>`;
    }).join('');
    return `<tr>${cells}<td><button class="btn btn-sm btn-danger" onclick="deleteRow(${ri})" style="padding:2px 6px;font-size:10px">✕</button></td></tr>`;
  }).join('');

  // Listen for edits
  tbody.querySelectorAll('td[contenteditable]').forEach(td => {
    td.addEventListener('blur', function() {
      const r = parseInt(this.dataset.row);
      const c = parseInt(this.dataset.col);
      allData[r][c] = this.textContent;
    });
  });
}

function getColumnClass(colIdx, totalCols) {
  if (totalCols === 6) {
    return ['col-stt', 'col-word', 'col-abbr', 'col-ipa', 'col-type', 'col-meaning'][colIdx] || '';
  } else if (totalCols === 5) {
    return ['col-stt', 'col-word', 'col-ipa', 'col-type', 'col-meaning'][colIdx] || '';
  }
  return '';
}

function deleteRow(idx) {
  allData.splice(idx, 1);
  mergeAndRender();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============ ABBREVIATION MAPPING ============
const ABBR_MAP = {
  'n': 'N.', 'v': 'V.', 'adj': 'Adj.', 'adv': 'Adv.',
  'prep': 'Prep.', 'conj': 'Conj.', 'pro': 'Pron.', 'pron': 'Pron.',
  'det': 'Det.', 'num': 'Num.', 'mod': 'Mod.', 'excl': 'Excl.',
  'interj': 'Interj.', 'aux': 'Aux.'
};

function mapAbbr(raw) {
  if (!raw) return '';
  const s = String(raw).trim();
  // Already formatted (e.g. "N.", "Adj./Adv.")
  if (/^[A-Z]/.test(s)) return s;
  // Handle combos: "n, v" → "N./V.", "det, pro" → "Det./Pron."
  return s.split(/[,\/]/).map(p => {
    const key = p.trim().toLowerCase().replace(/[.\/]/g, '');
    return ABBR_MAP[key] || p.trim();
  }).join('/');
}

// ============ EXCEL EXPORT (ExcelJS) ============
async function downloadExcel(mode) {
  if (!allData.length) { showToast('Chưa có dữ liệu!', 'error'); return; }

  const outputName = document.getElementById('outputName').value || 'PTE_Vocab';
  const wordsPerSheet = parseInt(document.getElementById('wordsPerSheet').value) || 40;

  if (mode === 'single' || mode === 'both') {
    const wb = new ExcelJS.Workbook();
    addStyledSheet(wb, allData, detectedColumns, `Tất cả (${allData.length} từ)`);
    const buf = await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf]), `${outputName}_v2.xlsx`);
  }

  if (mode === 'multi' || mode === 'both') {
    const wb = new ExcelJS.Workbook();
    const totalSheets = Math.ceil(allData.length / wordsPerSheet);
    for (let i = 0; i < totalSheets; i++) {
      const start = i * wordsPerSheet;
      const end = Math.min(start + wordsPerSheet, allData.length);
      const chunk = allData.slice(start, end);
      const firstSTT = chunk[0]?.[0] || (start + 1);
      const lastSTT = chunk[chunk.length - 1]?.[0] || end;
      addStyledSheet(wb, chunk, detectedColumns, `Trang ${i+1} (${firstSTT}-${lastSTT})`);
    }
    const buf = await wb.xlsx.writeBuffer();
    saveAs(new Blob([buf]), `${outputName}_${totalSheets}trang.xlsx`);
  }

  showToast('Đã tải Excel!', 'success');
}

function addStyledSheet(wb, data, columns, sheetName) {
  const ws = wb.addWorksheet(sheetName);
  const colCount = columns.length;
  const border = { top:{style:'thin',color:{argb:'FFD0D0D0'}}, bottom:{style:'thin',color:{argb:'FFD0D0D0'}}, left:{style:'thin',color:{argb:'FFD0D0D0'}}, right:{style:'thin',color:{argb:'FFD0D0D0'}} };

  // Detect which column index is the "Loại" / type column
  const typeColIdx = columns.findIndex(c => /lo[aạ]i/i.test(c) || /type/i.test(c) || /abbr/i.test(c));

  // Column config based on count
  let colWidths, colStyles;
  if (colCount === 6) {
    colWidths = [6, 22, 12, 26, 16, 38];
    colStyles = [
      {font:{name:'Arial',size:10,color:{argb:'FF555555'}}, alignment:{horizontal:'center',vertical:'middle'}},
      {font:{name:'Arial',size:10,bold:true}, alignment:{horizontal:'left',vertical:'middle'}},
      {font:{name:'Arial',size:10,color:{argb:'FF555555'}}, alignment:{horizontal:'center',vertical:'middle'}},
      {font:{name:'Arial',size:10,italic:true,color:{argb:'FF555555'}}, alignment:{horizontal:'left',vertical:'middle'}},
      {font:{name:'Arial',size:10,bold:true,color:{argb:'FFCC0000'}}, alignment:{horizontal:'center',vertical:'middle'}},
      {font:{name:'Arial',size:10}, alignment:{horizontal:'left',vertical:'middle'}},
    ];
  } else {
    colWidths = [6, 22, 28, 18, 42];
    colStyles = [
      {font:{name:'Arial',size:10,color:{argb:'FF555555'}}, alignment:{horizontal:'center',vertical:'middle'}},
      {font:{name:'Arial',size:10,bold:true}, alignment:{horizontal:'left',vertical:'middle'}},
      {font:{name:'Arial',size:10,italic:true,color:{argb:'FF555555'}}, alignment:{horizontal:'left',vertical:'middle'}},
      {font:{name:'Arial',size:10,bold:true,color:{argb:'FFCC0000'}}, alignment:{horizontal:'center',vertical:'middle'}},
      {font:{name:'Arial',size:10}, alignment:{horizontal:'left',vertical:'middle'}},
    ];
  }

  // Set column widths
  ws.columns = colWidths.map(w => ({ width: w }));

  // Header row
  const headerRow = ws.addRow(columns);
  headerRow.height = 22;
  headerRow.eachCell((cell) => {
    cell.font = { name: 'Arial', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A2E' } };
    cell.alignment = { horizontal: 'center', vertical: 'middle' };
    cell.border = border;
  });

  // Data rows
  data.forEach((rowData, ri) => {
    // Map abbreviations in type column
    const mappedRow = rowData.map((val, ci) => {
      if (ci === typeColIdx) return mapAbbr(val);
      return val;
    });

    const row = ws.addRow(mappedRow);
    row.height = 22;
    row.eachCell((cell, colNumber) => {
      const ci = colNumber - 1;
      const style = colStyles[ci] || {};
      if (style.font) cell.font = style.font;
      if (style.alignment) cell.alignment = style.alignment;
      cell.border = border;
      // Alternating rows
      if (ri % 2 === 1) {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' } };
      }
    });
  });

  // Freeze top row
  ws.views = [{ state: 'frozen', ySplit: 1 }];
  // AutoFilter
  const lastCol = String.fromCharCode(64 + colCount);
  ws.autoFilter = `A1:${lastCol}${data.length + 1}`;
}

// ============ UTILITIES ============
function addLog(msg, type) {
  const log = document.getElementById('statusLog');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function showToast(msg, type) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('active');
}

function copyAsText() {
  if (!allData.length) return;
  const header = detectedColumns.join('\t');
  const rows = allData.map(r => r.join('\t')).join('\n');
  navigator.clipboard.writeText(header + '\n' + rows).then(() => {
    showToast('Đã copy vào clipboard!', 'success');
  });
}
